<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos de mamá — calendario de cuidado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF7F1;
    --surface: #FFFFFF;
    --ink: #2A2F2A;
    --ink-soft: #6E7469;
    --line: #E6E0D3;
    --accent: #3F5A4D;      /* verde pino — cromo de la interfaz */
    --accent-soft: #E7EDE9;
    --warn: #B5482E;

    --s1: #C1694F; /* terracota */
    --s2: #7A8B6F; /* salvia */
    --s3: #5B7C99; /* azul apagado */
    --s4: #8B5A72; /* ciruela */
    --s5: #C9A227; /* ocre */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding:28px 32px 60px;
    min-height:100vh;
  }
  .wrap{max-width:1280px;margin:0 auto;}

  /* ---- header ---- */
  header{
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
    gap:18px; margin-bottom:26px; padding-bottom:20px; border-bottom:1px solid var(--line);
  }
  .title-block h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:clamp(28px,3.4vw,42px);
    margin:0 0 4px; letter-spacing:-0.01em;
  }
  .title-block p{margin:0; color:var(--ink-soft); font-size:14.5px;}
  .month-nav{
    display:flex; align-items:center; gap:14px; background:var(--surface);
    border:1px solid var(--line); border-radius:14px; padding:8px 10px;
  }
  .month-nav button{
    width:36px; height:36px; border-radius:9px; border:1px solid var(--line);
    background:#fff; color:var(--accent); font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  .month-nav button:hover{background:var(--accent-soft);}
  .month-nav .current{
    font-family:'Fraunces',serif; font-size:19px; font-weight:600; min-width:190px;
    text-align:center; text-transform:capitalize;
  }
  .today-btn{
    border:1px solid var(--accent); color:var(--accent); background:#fff;
    border-radius:9px; padding:0 14px; font-size:13.5px; font-weight:600; cursor:pointer;
    height:36px;
  }
  .today-btn:hover{background:var(--accent-soft);}

  /* ---- summary cards ---- */
  .summary{
    display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:28px;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:16px 16px 14px; position:relative; overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--c);
  }
  .card .name-row{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .dot{width:11px; height:11px; border-radius:50%; background:var(--c); flex:none;}
  .name-input{
    font-family:'Inter'; font-weight:700; font-size:14px; border:none; background:transparent;
    color:var(--ink); width:100%; padding:2px 0; border-bottom:1px dashed transparent;
  }
  .name-input:hover, .name-input:focus{border-bottom:1px dashed var(--line); outline:none;}
  .card .big{
    font-family:'Fraunces',serif; font-size:34px; font-weight:600; line-height:1; color:var(--ink);
  }
  .card .unit{font-size:12px; color:var(--ink-soft); font-weight:500;}
  .bar-track{height:6px; background:var(--accent-soft); border-radius:4px; margin:10px 0 6px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--c); border-radius:4px; transition:width .3s;}
  .card .hist{font-size:11.5px; color:var(--ink-soft);}
  .card.flag-low::after{
    content:'menos turnos'; position:absolute; top:14px; right:14px; font-size:10px;
    color:var(--accent); background:var(--accent-soft); padding:2px 7px; border-radius:20px; font-weight:700;
  }
  .card.flag-high::after{
    content:'más turnos'; position:absolute; top:14px; right:14px; font-size:10px;
    color:var(--warn); background:#F6E7E2; padding:2px 7px; border-radius:20px; font-weight:700;
  }

  /* ---- calendar ---- */
  .cal-shell{
    background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:22px;
  }
  .weekdays{
    display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:10px;
  }
  .weekdays span{
    text-align:center; font-size:12px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:var(--ink-soft);
  }
  .grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:10px;
  }
  .day{
    position:relative; min-height:118px; border-radius:13px; border:1px solid var(--line);
    background:#fff; padding:10px; cursor:pointer; transition:.12s; display:flex; flex-direction:column;
  }
  .day:hover{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft) inset;}
  .day.pad{background:transparent; border:1px dashed var(--line); cursor:default; opacity:.4;}
  .day.pad:hover{box-shadow:none; border-color:var(--line);}
  .day .num{font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--ink);}
  .day.today .num{
    display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px;
    background:var(--accent); color:#fff; border-radius:50%; font-size:14px;
  }
  .day .assign{
    margin-top:auto; font-size:12.5px; font-weight:700; padding:5px 8px; border-radius:8px;
    display:inline-flex; align-items:center; gap:6px; align-self:flex-start; max-width:100%;
  }
  .day .assign .adot{width:8px;height:8px;border-radius:50%;flex:none;}
  .day .assign span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .day.empty-cell .assign{color:var(--ink-soft); background:var(--bg); border:1px dashed var(--line); font-weight:600;}

  /* ---- popover ---- */
  .pop{
    position:fixed; z-index:50; background:#fff; border:1px solid var(--line); border-radius:14px;
    box-shadow:0 14px 40px rgba(30,30,20,.18); padding:10px; display:none; min-width:190px;
  }
  .pop.show{display:block;}
  .pop .opt{
    display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:9px; cursor:pointer;
    font-size:13.5px; font-weight:600;
  }
  .pop .opt:hover{background:var(--accent-soft);}
  .pop .opt .adot{width:10px; height:10px; border-radius:50%; flex:none;}
  .pop .clear{color:var(--warn); border-top:1px solid var(--line); margin-top:6px; padding-top:9px;}

  /* ---- footer note ---- */
  .footnote{
    margin-top:20px; font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:8px;
  }
  .footnote svg{flex:none;}

  @media (max-width:980px){
    .summary{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:640px){
    body{padding:18px 14px 40px;}
    .summary{grid-template-columns:1fr 1fr;}
    .day{min-height:82px; padding:7px;}
    .day .assign{font-size:11px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>Turnos de mamá</h1>
      <p id="subtitle">Calendario compartido para organizar el cuidado entre los 5 hermanos</p>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <button class="today-btn" id="todayBtn">Hoy</button>
      <div class="month-nav">
        <button id="prevBtn">‹</button>
        <div class="current" id="currentLabel">—</div>
        <button id="nextBtn">›</button>
      </div>
    </div>
  </header>

  <section class="summary" id="summary"></section>

  <section class="cal-shell">
    <div class="weekdays">
      <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <div class="footnote">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    Este calendario se guarda de forma compartida: todos los hermanos que abran este enlace ven y pueden editar los mismos turnos.
  </div>

</div>

<div class="pop" id="pop"></div>

<script>
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let state = {
  siblings: [
    {id:'s1', name:'Hermano 1', color:'var(--s1)', hex:'#C1694F'},
    {id:'s2', name:'Hermano 2', color:'var(--s2)', hex:'#7A8B6F'},
    {id:'s3', name:'Hermano 3', color:'var(--s3)', hex:'#5B7C99'},
    {id:'s4', name:'Hermano 4', color:'var(--s4)', hex:'#8B5A72'},
    {id:'s5', name:'Hermano 5', color:'var(--s5)', hex:'#C9A227'},
  ],
  assignments: {} // 'YYYY-MM-DD' -> siblingId
};

let view = new Date();
view.setDate(1);
const todayStr = fmt(new Date());

function fmt(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

const STORAGE_KEY = 'cuidado-mama:data';

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      if(parsed.siblings) state.siblings = parsed.siblings;
      if(parsed.assignments) state.assignments = parsed.assignments;
    }
  }catch(e){
    // no hay datos guardados todavía, se usan los valores por defecto
  }
  render();
}

let saveTimer = null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
    }catch(e){
      console.error('No se pudo guardar', e);
    }
  }, 250);
}

function siblingById(id){ return state.siblings.find(s=>s.id===id); }

function render(){
  renderHeader();
  renderSummary();
  renderGrid();
}

function renderHeader(){
  document.getElementById('currentLabel').textContent = MONTHS[view.getMonth()]+' '+view.getFullYear();
}

function monthCounts(year, month){
  const counts = {}; state.siblings.forEach(s=>counts[s.id]=0);
  Object.entries(state.assignments).forEach(([date,sid])=>{
    const [y,m] = date.split('-').map(Number);
    if(y===year && m===month+1 && counts[sid]!==undefined) counts[sid]++;
  });
  return counts;
}

function totalCounts(){
  const counts = {}; state.siblings.forEach(s=>counts[s.id]=0);
  Object.values(state.assignments).forEach(sid=>{ if(counts[sid]!==undefined) counts[sid]++; });
  return counts;
}

function renderSummary(){
  const counts = monthCounts(view.getFullYear(), view.getMonth());
  const totals = totalCounts();
  const daysInMonth = new Date(view.getFullYear(), view.getMonth()+1, 0).getDate();
  const values = Object.values(counts);
  const max = Math.max(...values), min = Math.min(...values);
  const spread = max - min;

  const el = document.getElementById('summary');
  el.innerHTML = '';
  state.siblings.forEach(s=>{
    const c = counts[s.id]||0;
    const t = totals[s.id]||0;
    const pct = daysInMonth ? Math.round((c/daysInMonth)*100) : 0;
    const card = document.createElement('div');
    card.className = 'card';
    if(spread>=3 && c===min) card.classList.add('flag-low');
    if(spread>=3 && c===max && max>0) card.classList.add('flag-high');
    card.style.setProperty('--c', s.hex);
    card.innerHTML = `
      <div class="name-row">
        <span class="dot"></span>
        <input class="name-input" value="${s.name}" data-id="${s.id}" spellcheck="false">
      </div>
      <div class="big">${c}<span class="unit"> días</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="hist">Histórico total: ${t} días</div>
    `;
    el.appendChild(card);
  });

  el.querySelectorAll('.name-input').forEach(inp=>{
    inp.addEventListener('change', (e)=>{
      const sib = siblingById(e.target.dataset.id);
      sib.name = e.target.value.trim() || sib.name;
      saveState();
      renderGrid();
    });
  });
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const year = view.getFullYear(), month = view.getMonth();
  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay() - 1; // lunes = 0
  if(startOffset < 0) startOffset = 6;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDaysInMonth = new Date(year, month, 0).getDate();

  const totalCells = Math.ceil((startOffset + daysInMonth)/7)*7;

  for(let i=0;i<totalCells;i++){
    const dayNum = i - startOffset + 1;
    const cell = document.createElement('div');

    if(dayNum < 1 || dayNum > daysInMonth){
      cell.className = 'day pad';
      const realNum = dayNum < 1 ? prevDaysInMonth + dayNum : dayNum - daysInMonth;
      cell.innerHTML = `<span class="num">${realNum}</span>`;
      grid.appendChild(cell);
      continue;
    }

    const dateObj = new Date(year, month, dayNum);
    const dateStr = fmt(dateObj);
    const sid = state.assignments[dateStr];
    const sib = sid ? siblingById(sid) : null;

    cell.className = 'day' + (dateStr===todayStr ? ' today' : '') + (!sib ? ' empty-cell' : '');
    cell.dataset.date = dateStr;

    let assignHtml = `<div class="assign"><span>Sin asignar</span></div>`;
    if(sib){
      cell.style.background = sib.hex + '17';
      cell.style.borderColor = sib.hex + '55';
      assignHtml = `<div class="assign" style="background:${sib.hex}22; color:${sib.hex};">
        <span class="adot" style="background:${sib.hex}"></span><span>${sib.name}</span>
      </div>`;
    }

    cell.innerHTML = `<span class="num">${dayNum}</span>${assignHtml}`;
    cell.addEventListener('click', (e)=> openPopover(e.currentTarget, dateStr));
    grid.appendChild(cell);
  }
}

function openPopover(cellEl, dateStr){
  const pop = document.getElementById('pop');
  let html = '';
  state.siblings.forEach(s=>{
    html += `<div class="opt" data-sid="${s.id}"><span class="adot" style="background:${s.hex}"></span>${s.name}</div>`;
  });
  html += `<div class="opt clear" data-sid="">Quitar asignación</div>`;
  pop.innerHTML = html;

  const rect = cellEl.getBoundingClientRect();
  pop.style.left = Math.min(rect.left, window.innerWidth-210) + 'px';
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.classList.add('show');

  pop.querySelectorAll('.opt').forEach(opt=>{
    opt.onclick = ()=>{
      const sid = opt.dataset.sid;
      if(sid){ state.assignments[dateStr] = sid; }
      else { delete state.assignments[dateStr]; }
      pop.classList.remove('show');
      saveState();
      render();
    };
  });

  setTimeout(()=>{
    document.addEventListener('click', function closePop(e){
      if(!pop.contains(e.target) && !cellEl.contains(e.target)){
        pop.classList.remove('show');
        document.removeEventListener('click', closePop);
      }
    });
  },0);
}

document.getElementById('prevBtn').addEventListener('click', ()=>{
  view.setMonth(view.getMonth()-1); render();
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  view.setMonth(view.getMonth()+1); render();
});
document.getElementById('todayBtn').addEventListener('click', ()=>{
  view = new Date(); view.setDate(1); render();
});

loadState();
</script>
</body>
</html>
